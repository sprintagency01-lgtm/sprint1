<form method="post" action="/admin/clientes/{{ t.id }}/servicios" id="services-form">
  <div class="bg-white rounded-xl border border-slate-200">
    <div class="p-6 flex items-center justify-between border-b border-slate-100">
      <div>
        <h2 class="text-sm font-semibold">Catálogo de servicios</h2>
        <p class="text-xs text-slate-500 mt-0.5">Define qué puede reservar el bot. La duración bloquea el calendario.</p>
      </div>
      <button type="button" onclick="addService()" class="flex items-center gap-2 text-sm px-3 py-2 rounded-lg bg-slate-900 hover:bg-slate-800 text-white font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M12 5v14M5 12h14"/></svg>
        Añadir servicio
      </button>
    </div>

    <table class="w-full">
      <thead>
        <tr class="text-left text-xs uppercase tracking-wider text-slate-500 border-b border-slate-100">
          <th class="py-3 px-6 font-medium">Nombre</th>
          <th class="py-3 px-6 font-medium">Duración</th>
          <th class="py-3 px-6 font-medium">Precio</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="services-tbody">
        {% for s in t.services %}
        <tr class="border-b border-slate-100 last:border-b-0 service-row">
          <td class="py-3 px-6">
            <input name="nombre" value="{{ s.nombre }}" class="font-medium text-slate-900 bg-transparent border border-transparent hover:border-slate-200 rounded px-2 py-1 w-full"/>
          </td>
          <td class="py-3 px-6">
            <div class="inline-flex items-center gap-1">
              <input name="duracion_min" type="number" value="{{ s.duracion_min }}" class="w-20 px-2 py-1 rounded border border-slate-200 text-sm"/>
              <span class="text-xs text-slate-500">min</span>
            </div>
          </td>
          <td class="py-3 px-6">
            <div class="inline-flex items-center gap-1">
              <input name="precio" type="number" step="0.01" value="{{ s.precio }}" class="w-24 px-2 py-1 rounded border border-slate-200 text-sm"/>
              <span class="text-xs text-slate-500">€</span>
            </div>
          </td>
          <td class="py-3 px-6 text-right">
            <button type="button" onclick="this.closest('tr').remove()" class="p-1.5 rounded hover:bg-slate-100 text-slate-400 hover:text-rose-600">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V6"/></svg>
            </button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div class="mt-6 flex items-center justify-end">
    <button type="submit" class="text-sm px-4 py-2 rounded-lg bg-brand-600 hover:bg-brand-700 text-white font-medium">Guardar servicios</button>
  </div>
</form>

<template id="service-tpl">
  <tr class="border-b border-slate-100 service-row">
    <td class="py-3 px-6"><input name="nombre" placeholder="Servicio" class="font-medium text-slate-900 bg-transparent border border-slate-200 hover:border-slate-300 rounded px-2 py-1 w-full"/></td>
    <td class="py-3 px-6"><div class="inline-flex items-center gap-1"><input name="duracion_min" type="number" value="30" class="w-20 px-2 py-1 rounded border border-slate-200 text-sm"/><span class="text-xs text-slate-500">min</span></div></td>
    <td class="py-3 px-6"><div class="inline-flex items-center gap-1"><input name="precio" type="number" step="0.01" value="0" class="w-24 px-2 py-1 rounded border border-slate-200 text-sm"/><span class="text-xs text-slate-500">€</span></div></td>
    <td class="py-3 px-6 text-right"><button type="button" onclick="this.closest('tr').remove()" class="p-1.5 rounded hover:bg-slate-100 text-slate-400 hover:text-rose-600"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V6"/></svg></button></td>
  </tr>
</template>

<script>
function addService() {
  const tpl = document.getElementById('service-tpl');
  const tbody = document.getElementById('services-tbody');
  tbody.appendChild(tpl.content.cloneNode(true));
}
</script>
