<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>{% block title %}Sprintia · Admin{% endblock %}</title>

<!-- PWA -->
<link rel="manifest" href="/admin/static/manifest.json">
<meta name="theme-color" content="#15161a">
<meta name="application-name" content="Sprintia Admin">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprintia Admin">
<link rel="apple-touch-icon" href="/admin/static/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/admin/static/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/admin/static/icons/icon-192.png">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Sprintia Pulse — paleta brand (electric blue). En el CMS Tailwind se queda
  // como abstracción; los tokens canónicos están en la landing.
  tailwind.config = {
    theme: { extend: {
      fontFamily: {
        sans: ['Inter Tight','ui-sans-serif','system-ui','-apple-system','Segoe UI','Roboto','sans-serif'],
        serif: ['Instrument Serif','Georgia','serif'],
        mono: ['JetBrains Mono','ui-monospace','monospace'],
      },
      colors: { brand: {
        50:'#eef1ff', 100:'#dee3ff', 200:'#bcc6ff', 500:'#2d4cff', 600:'#1f37c4', 700:'#172a99', 900:'#15161a',
      } }
    } }
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15161a; --bone:#f4efe6; --paper:#fafaf7; --stone:#7d7c78;
    --mist:#e3ddd0; --line:rgba(21,22,26,0.10);
    --accent:#2d4cff; --accent-2:#1f37c4; --accent-soft:#dee3ff;
  }
  body { font-family: 'Inter Tight', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
  .nav-item.active { background:#f1f5f9; color: var(--ink); font-weight:600; }
  .nav-item.active svg { color: var(--accent); }
  .tab-btn.active { color: var(--ink); border-color: var(--accent); }
  .chat-bubble-in  { background:#f1f5f9; border-radius:14px 14px 14px 4px; }
  .chat-bubble-out { background: var(--accent-soft); border-radius:14px 14px 4px 14px; }
  .fade-in { animation: fadeIn .2s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px);} to { opacity:1; transform: translateY(0);} }
</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
{% block body %}{% endblock %}

<!-- PWA: registro del service worker (scope /admin/). -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("/admin/sw.js", { scope: "/admin/" })
        .catch((err) => console.warn("[pwa] sw register failed", err));
    });
  }
</script>
</body>
</html>
