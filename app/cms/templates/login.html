{% extends "base.html" %}
{% block title %}Iniciar sesión · ReservaBot{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-2 justify-center mb-8">
      <div class="w-10 h-10 rounded-lg bg-brand-600 flex items-center justify-center text-white">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-5l-4 4v-4Z"/></svg>
      </div>
      <div class="font-semibold text-xl">ReservaBot</div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-6">
      <h1 class="text-lg font-semibold mb-1">Iniciar sesión</h1>
      <p class="text-sm text-slate-500 mb-6">Panel de administración interno</p>

      {% if error %}
        <div class="mb-4 p-3 rounded-lg bg-rose-50 border border-rose-200 text-sm text-rose-700">{{ error }}</div>
      {% endif %}

      <form method="post" action="/admin/login" class="space-y-4">
        <div>
          <label class="text-xs font-medium text-slate-700 mb-1 block">Email</label>
          <input name="email" type="email" required autofocus autocomplete="username"
            class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-brand-500"/>
        </div>
        <div>
          <label class="text-xs font-medium text-slate-700 mb-1 block">Contraseña</label>
          <input name="password" type="password" required autocomplete="current-password"
            class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-brand-500"/>
        </div>
        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium py-2 rounded-lg">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-xs text-slate-400 text-center mt-6">ReservaBot · Panel interno</p>
  </div>
</div>
{% endblock %}
