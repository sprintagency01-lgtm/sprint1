{% extends "base.html" %}
{% block title %}Iniciar sesión · Sprintia Admin{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center p-4" style="background:#f4efe6">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-3 justify-center mb-8">
      <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" class="w-9 h-9" aria-hidden="true">
        <rect x="8.46"  y="12.96" width="4.68" height="14.4"  rx="2.34" fill="#15161a"/>
        <rect x="15.66" y="7.2"   width="4.68" height="23.04" rx="2.34" fill="#15161a"/>
        <rect x="22.86" y="15.12" width="4.68" height="10.8"  rx="2.34"  fill="#15161a"/>
        <circle cx="25.2" cy="7.92" r="3.06" fill="#2d4cff"/>
      </svg>
      <div class="font-semibold text-xl tracking-tight" style="letter-spacing:-0.035em">Sprintia</div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-6">
      <h1 class="mb-1" style="font-family:'Instrument Serif',serif;font-style:italic;font-size:30px;letter-spacing:-0.02em">Iniciar sesión</h1>
      <p class="text-sm text-slate-500 mb-6">Panel de administración interno</p>

      {% if error %}
        <div class="mb-4 p-3 rounded-lg bg-rose-50 border border-rose-200 text-sm text-rose-700">{{ error }}</div>
      {% endif %}

      <form method="post" action="/admin/login" class="space-y-4">
        <div>
          <label class="text-xs font-medium text-slate-700 mb-1 block">Email</label>
          <input name="email" type="email" required autofocus autocomplete="username"
            class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-brand-500"/>
        </div>
        <div>
          <label class="text-xs font-medium text-slate-700 mb-1 block">Contraseña</label>
          <input name="password" type="password" required autocomplete="current-password"
            class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-brand-500"/>
        </div>
        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium py-2 rounded-lg">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-xs text-slate-400 text-center mt-6">Sprintia · Panel interno</p>
  </div>
</div>
{% endblock %}
