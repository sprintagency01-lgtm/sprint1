<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sin conexión · Sprintia Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#15161a; --bone:#f4efe6; --stone:#7d7c78; --accent:#2d4cff; }
  body{
    margin:0; min-height:100vh;
    font-family:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bone); color:var(--ink);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .wrap{ max-width:380px; text-align:center; }
  .mark{ width:60px; height:60px; margin:0 auto 22px; display:block; }
  h1{ font-family:'Instrument Serif',serif; font-style:italic; font-size:34px; margin:0 0 10px; letter-spacing:-0.02em; }
  p{ color:var(--stone); line-height:1.5; margin:0 0 24px; font-size:15px; }
  button{
    background:var(--ink); color:var(--bone); border:none;
    padding:13px 24px; border-radius:999px; font-size:14px; font-weight:500;
    cursor:pointer; font-family:inherit;
    transition: background .15s;
  }
  button:hover{ background:var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <svg class="mark" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
      <rect x="14.1"  y="21.6" width="7.8" height="24"   rx="3.9" fill="#15161a"/>
      <rect x="26.1"  y="12"   width="7.8" height="38.4" rx="3.9" fill="#15161a"/>
      <rect x="38.1"  y="25.2" width="7.8" height="18"   rx="3.9" fill="#15161a"/>
      <circle cx="42" cy="13.2" r="5.1" fill="#2d4cff"/>
    </svg>
    <h1>Sin conexión</h1>
    <p>Sprintia Admin necesita red para mostrar datos. Reintenta cuando vuelva la conexión.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
