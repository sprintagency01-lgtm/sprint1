<style>
  body { font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
  .dark ::-webkit-scrollbar-thumb { background: #334155; }
  .nav-item.active { background:#f1f5f9; color:#0f172a; font-weight:600; }
  .nav-item.active svg { color:#059669; }
  .dark .nav-item.active { background:#1e293b; color:#f1f5f9; }
  .tab-btn.active { color:#0f172a; border-color:#059669; }
  .dark .tab-btn.active { color:#f1f5f9; }
  .chat-bubble-in  { background:#f1f5f9; border-radius:14px 14px 14px 4px; }
  .chat-bubble-out { background:#d1fae5; border-radius:14px 14px 4px 14px; }
  .dark .chat-bubble-in { background:#1e293b; color:#e2e8f0; }
  .dark .chat-bubble-out { background:#064e3b; color:#d1fae5; }
  .fade-in { animation: fadeIn .2s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px);} to { opacity:1; transform: translateY(0);} }
  @keyframes pulseDot { 0%,100% { opacity:1 } 50% { opacity:.3 } }
  .pulse-dot { animation: pulseDot 1.6s infinite; }
  .slide-in-right { animation: slideInRight .25s ease-out; }
  @keyframes slideInRight { from { transform: translateX(100%);} to { transform: translateX(0);} }
  .scroll-hide::-webkit-scrollbar { display:none; }
  /* Toggle switch */
  .tg { position:relative; width:36px; height:20px; background:#cbd5e1; border-radius:999px; transition:background .15s; cursor:pointer; flex-shrink:0;}
  .tg::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; background:#fff; border-radius:999px; transition:transform .15s; box-shadow:0 1px 2px rgba(0,0,0,.15);}
  .tg.on { background:#059669; }
  .tg.on::after { transform: translateX(16px); }
  .dark .tg { background:#475569; }
  .dark .tg.on { background:#059669; }
  /* IA voice recording */
  .rec-pulse { box-shadow: 0 0 0 0 rgba(244,63,94,0.5); animation: recPulse 1.4s infinite; }
  @keyframes recPulse { 0% { box-shadow:0 0 0 0 rgba(244,63,94,.55);} 70% { box-shadow:0 0 0 14px rgba(244,63,94,0);} 100% { box-shadow:0 0 0 0 rgba(244,63,94,0);} }
  .wave-bar { animation: waveBar 1s ease-in-out infinite; transform-origin:bottom; }
  @keyframes waveBar { 0%,100% { transform: scaleY(.3);} 50% { transform: scaleY(1);} }
</style>
