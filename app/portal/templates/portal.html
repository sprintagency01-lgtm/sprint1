<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sprintia · {{ negocio_nombre }}</title>

<!-- PWA -->
<link rel="manifest" href="/app/static/manifest.json">
<meta name="theme-color" content="#15161a">
<meta name="application-name" content="Sprintia">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprintia">
<link rel="apple-touch-icon" href="/app/static/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/app/static/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/app/static/icons/icon-192.png">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Sprintia Pulse — paleta brand (electric blue) + ink
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      fontFamily: {
        sans: ['Inter Tight','ui-sans-serif','system-ui','-apple-system','Segoe UI','Roboto','sans-serif'],
        serif: ['Instrument Serif','Georgia','serif'],
        mono: ['JetBrains Mono','ui-monospace','monospace'],
      },
      colors: { brand: {
        50:'#eef1ff', 100:'#dee3ff', 200:'#bcc6ff', 500:'#2d4cff', 600:'#1f37c4', 700:'#172a99', 900:'#15161a',
      } }
    } }
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15161a; --bone:#f4efe6; --paper:#fafaf7; --stone:#7d7c78;
    --line:rgba(21,22,26,0.10);
    --accent:#2d4cff; --accent-2:#1f37c4; --accent-soft:#dee3ff;
  }
  body { font-family: 'Inter Tight', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
  .dark ::-webkit-scrollbar-thumb { background: #334155; }
  .nav-item.active { background:#f1f5f9; color: var(--ink); font-weight:600; }
  .nav-item.active svg { color: var(--accent); }
  .dark .nav-item.active { background:#1e293b; color:#f1f5f9; }
  .tab-btn.active { color: var(--ink); border-color: var(--accent); }
  .dark .tab-btn.active { color:#f1f5f9; }
  .chat-bubble-in  { background:#f1f5f9; border-radius:14px 14px 14px 4px; }
  .chat-bubble-out { background: var(--accent-soft); border-radius:14px 14px 4px 14px; }
  .dark .chat-bubble-in { background:#1e293b; color:#e2e8f0; }
  .dark .chat-bubble-out { background:#172a99; color:#dee3ff; }
  .fade-in { animation: fadeIn .2s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px);} to { opacity:1; transform: translateY(0);} }
  @keyframes pulseDot { 0%,100% { opacity:1 } 50% { opacity:.3 } }
  .pulse-dot { animation: pulseDot 1.6s infinite; }
  .slide-in-right { animation: slideInRight .25s ease-out; }
  @keyframes slideInRight { from { transform: translateX(100%);} to { transform: translateX(0);} }
  .scroll-hide::-webkit-scrollbar { display:none; }
  /* Toggle switch */
  .tg { position:relative; width:36px; height:20px; background:#cbd5e1; border-radius:999px; transition:background .15s; cursor:pointer; flex-shrink:0;}
  .tg::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; background:#fff; border-radius:999px; transition:transform .15s; box-shadow:0 1px 2px rgba(0,0,0,.15);}
  .tg.on { background:#059669; }
  .tg.on::after { transform: translateX(16px); }
  .dark .tg { background:#475569; }
  .dark .tg.on { background:#059669; }
  /* IA voice recording */
  .rec-pulse { box-shadow: 0 0 0 0 rgba(244,63,94,0.5); animation: recPulse 1.4s infinite; }
  @keyframes recPulse { 0% { box-shadow:0 0 0 0 rgba(244,63,94,.55);} 70% { box-shadow:0 0 0 14px rgba(244,63,94,0);} 100% { box-shadow:0 0 0 0 rgba(244,63,94,0);} }
  .wave-bar { animation: waveBar 1s ease-in-out infinite; transform-origin:bottom; }
  @keyframes waveBar { 0%,100% { transform: scaleY(.3);} 50% { transform: scaleY(1);} }
</style>

<!-- Estado inicial del tenant renderizado por el backend -->
<script>
  window.__PORTAL_DATA__ = {{ portal_data_json | safe }};
</script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">

<div id="root"></div>

<script type="text/babel" src="/app/static/data.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/shell.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/screen_hoy.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/screen_llamadas.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/screen_reservas.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/screen_ingresos.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/screen_servicios.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/screen_equipo.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/screen_ajustes.jsx?v={{ asset_version }}"></script>
<script type="text/babel" src="/app/static/app.jsx?v={{ asset_version }}"></script>

<!-- PWA: registro del service worker (scope /app/) -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("/app/sw.js", { scope: "/app/" })
        .catch((err) => console.warn("[pwa] sw register failed", err));
    });
  }
</script>

</body>
</html>
