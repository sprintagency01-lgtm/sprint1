<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Entrar · Sprint</title>

<!-- PWA -->
<link rel="manifest" href="/app/static/manifest.json">
<meta name="theme-color" content="#059669">
<meta name="application-name" content="Sprint">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sprint">
<link rel="apple-touch-icon" href="/app/static/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/app/static/icons/favicon-32.png">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','-apple-system','sans-serif'] },
      colors: { brand: {
        50:'#ecfdf5',500:'#10b981',600:'#059669',700:'#047857',
      } }
    } }
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 text-slate-900 antialiased">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-2 mb-6 justify-center">
      <div class="w-9 h-9 rounded-xl bg-brand-600 flex items-center justify-center text-white font-semibold">S</div>
      <div class="text-lg font-semibold tracking-tight">Sprintagency</div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
      <h1 class="text-xl font-semibold mb-1">Entra a tu panel</h1>
      <p class="text-sm text-slate-500 mb-5">Gestiona tu bot, reservas y equipo.</p>

      {% if error %}
        <div class="mb-4 text-sm text-rose-700 bg-rose-50 border border-rose-100 rounded-lg px-3 py-2">{{ error }}</div>
      {% endif %}

      <form method="post" action="/app/login" class="space-y-3">
        <label class="block">
          <div class="text-xs text-slate-500 mb-1">Email</div>
          <input type="email" name="email" required autofocus autocomplete="username"
            class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:border-brand-500 focus:outline-none"
            value="{{ email or '' }}" />
        </label>
        <label class="block">
          <div class="text-xs text-slate-500 mb-1">Contraseña</div>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:border-brand-500 focus:outline-none" />
        </label>
        <button type="submit"
          class="w-full bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium py-2 rounded-lg transition">
          Entrar
        </button>
      </form>
    </div>
    <div class="text-center text-xs text-slate-400 mt-4">¿Problemas para entrar? Escribe a tu contacto en Sprint.</div>
  </div>

<!-- PWA: registramos el SW también desde login para que se pueda instalar
     antes de pasar la autenticación. Scope /app/. -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("/app/sw.js", { scope: "/app/" })
        .catch((err) => console.warn("[pwa] sw register failed", err));
    });
  }
</script>
</body>
</html>
