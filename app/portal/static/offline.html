<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sin conexión · Sprint</title>
<style>
  :root { color-scheme: light dark; }
  body{
    margin:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f8fafc; color:#0f172a;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .wrap{
    max-width:380px; text-align:center;
  }
  .logo{
    width:56px; height:56px; border-radius:14px;
    background:#0F1A14; color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    font-weight:700; font-size:24px;
    margin-bottom:18px;
    position:relative;
  }
  .logo::after{
    content:""; position:absolute; right:-2px; top:-2px;
    width:14px; height:14px; border-radius:50%; background:#2F7A55;
    border:2px solid #f8fafc;
  }
  h1{ font-size:22px; margin:0 0 8px; letter-spacing:-0.01em; }
  p{ color:#475569; line-height:1.5; margin:0 0 22px; }
  button{
    background:#059669; color:#fff; border:none;
    padding:12px 22px; border-radius:10px; font-size:15px; font-weight:600;
    cursor:pointer;
  }
  button:hover{ background:#047857; }
  @media (prefers-color-scheme: dark){
    body{ background:#0f172a; color:#f1f5f9; }
    p{ color:#94a3b8; }
    .logo::after{ border-color:#0f172a; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">S</div>
    <h1>Sin conexión</h1>
    <p>No hay red. Cuando vuelva, tu panel volverá a estar disponible.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
