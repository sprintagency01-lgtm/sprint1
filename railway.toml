# Configuración Railway para bot_reservas_voz (ElevenLabs) + CMS
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
# Comando de arranque (coincide con Procfile, lo duplicamos por seguridad).
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
# Reinicio automático si falla (hasta 10 veces en ventanas de 30s).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Healthcheck: /health devuelve JSON ligero. (/ sirve la landing pública.)
healthcheckPath = "/health"
# 120s: suficiente para arrancar uvicorn + crear tablas + bootstrap admin.
healthcheckTimeout = 120
